<!doctype html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>MindForge - Générateur de Quiz par IA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Transformez vos cours en quiz interactifs grâce à l'intelligence artificielle.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Écran de chargement — affiché avant que Angular ne se charge */
    .splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f16;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
    }
    [data-theme="dark"] .splash {
      background: #050508;
      color: #e2e8f0;
    }
    .splash.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      animation: splash-bounce 1.2s ease infinite;
    }
    .splash-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .splash-subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 2.5rem;
    }
    [data-theme="dark"] .splash-subtitle {
      color: #94a3b8;
    }
    .splash-bar {
      width: 180px;
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    [data-theme="dark"] .splash-bar {
      background: #1e293b;
    }
    .splash-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #6C63FF, #FF6584);
      border-radius: 4px;
      animation: splash-loading 1.2s ease-in-out infinite;
    }
    @keyframes splash-loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes splash-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#6C63FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MindForge">
  <link rel="apple-touch-icon" href="icons/icon-152x152.png">
</head>
<body>
  <script>
    // Appliquer le thème sauvegardé immédiatement (évite le flash blanc/noir)
    (function() {
      var stored = localStorage.getItem('quiz-app-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <!-- Écran de chargement visible immédiatement -->
  <div class="splash" id="splash-screen">
    <div class="splash-logo" aria-hidden="true">🔥</div>
    <div class="splash-title">MindForge</div>
    <div class="splash-subtitle">Chargement de votre espace…</div>
    <div class="splash-bar" role="progressbar" aria-label="Chargement en cours">
      <div class="splash-bar-fill"></div>
    </div>
  </div>
  <app-root></app-root>
  <script>
    // Masquer le splash après un minimum de 5 secondes ET quand Angular est prêt
    (function() {
      var splashStart = Date.now();
      var MIN_DURATION = 5000; // 5 secondes minimum
      var angularReady = false;

      function hideSplash() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function() { splash.remove(); }, 500);
        }
      }

      function tryHide() {
        if (!angularReady) return;
        var elapsed = Date.now() - splashStart;
        if (elapsed >= MIN_DURATION) {
          hideSplash();
        } else {
          setTimeout(hideSplash, MIN_DURATION - elapsed);
        }
      }

      var observer = new MutationObserver(function() {
        var root = document.querySelector('app-root');
        if (root && root.children.length > 0) {
          angularReady = true;
          observer.disconnect();
          tryHide();
        }
      });
      observer.observe(document.querySelector('app-root'), { childList: true });
    })();
  </script>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
